version: "3.8"

volumes:
  n8n_storage:
  postgres_storage:
  postgres_backups:
  ollama_storage:
  qdrant_storage:

networks:
  default:
    name: nola_network

x-shared-n8n: &shared-n8n
  restart: unless-stopped
  image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-1.62.1}
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-nola}
    - DB_POSTGRESDB_USER=${POSTGRES_USER:-nola}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_HOST=${N8N_HOST:-localhost}
    - N8N_PORT=5678
    - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
    - WEBHOOK_URL=${N8N_WEBHOOK_BASE_URL}
    - EXECUTIONS_PROCESS=main
    - EXECUTIONS_DATA_SAVE_ON_ERROR=all
    - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
    - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
    - N8N_METRICS=true
    - GENERIC_TIMEZONE=${TIMEZONE:-America/Los_Angeles}
  links:
    - postgres

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nola}
      - POSTGRES_USER=${POSTGRES_USER:-nola}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nola} -d ${POSTGRES_DB:-nola}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    <<: *shared-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  postgres-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        while true; do
          FILE=/backups/nola-$$(date +%Y%m%d-%H%M).sql.gz;
          pg_dump -h postgres -U $${POSTGRES_USER:-nola} $${POSTGRES_DB:-nola} | gzip > $$FILE &&
          echo \"[backup] saved $$FILE\";
          find /backups -name '*.sql.gz' -mtime +7 -delete;
          sleep 86400;
        done
      "

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-0.3.12}
    restart: unless-stopped
    volumes:
      - ollama_storage:/root/.ollama
    profiles:
      - local-ai

  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-v1.11.0}
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    profiles:
      - local-ai
